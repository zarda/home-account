name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # src/environments/environment.ts re-exports from .vscode/environment
      # (gitignored, holds local Firebase keys), so lint/test type-checking needs
      # a stub. The production build replaces environment.ts with the gitignored
      # environment.prod-local.ts, so the build step needs that stub too.
      - name: Create local environment stubs
        run: |
          mkdir -p .vscode
          cat > .vscode/environment.ts << 'EOF'
          export const environment = {
            production: false,
            firebase: {
              apiKey: 'ci-stub',
              authDomain: 'ci-stub',
              projectId: 'ci-stub',
              storageBucket: 'ci-stub',
              messagingSenderId: 'ci-stub',
              appId: 'ci-stub',
              measurementId: 'ci-stub'
            },
            donationUrlPaypal: ''
          };
          EOF
          cat > src/environments/environment.prod-local.ts << 'EOF'
          export const environment = {
            production: true,
            firebase: {
              apiKey: 'ci-stub',
              authDomain: 'ci-stub',
              projectId: 'ci-stub',
              storageBucket: 'ci-stub',
              messagingSenderId: 'ci-stub',
              appId: 'ci-stub',
              measurementId: 'ci-stub'
            },
            donationUrlPaypal: ''
          };
          EOF

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      # Java is required to run the Firebase Storage/Auth emulators.
      - name: Set up Java (Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Smoke test: real upload/download/delete + storage.rules enforcement
      # against the Firebase emulators (no production project needed; the
      # demo- project id runs the emulators fully offline).
      - name: Smoke test (Firebase emulators)
        run: npm run smoke

      - name: Build (production)
        run: npm run build
